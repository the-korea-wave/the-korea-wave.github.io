{{- /* 로컬 오버라이드 (WP-63/WP-64): shared taxonomy.html의 UI 문자열이 한국어로 고정 — 영문 번역. */ -}}
{{ define "main" }}
<h1>{{ .Title }}</h1>
<p class="taxonomy-desc">Browse posts by category.</p>
<ul class="taxonomy-list">
  {{ range .Data.Terms.Alphabetical }}
  <li class="taxonomy-item">
    <a class="taxonomy-link" href="{{ .Page.Permalink }}">
      <span class="taxonomy-name">{{ .Page.Title }}</span>
      <span class="taxonomy-count">{{ .Count }}</span>
    </a>
  </li>
  {{ else }}
  <li class="taxonomy-empty">No categories yet.</li>
  {{ end }}
</ul>
{{ end }}
